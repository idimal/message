<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Чаты — Messenger</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#111827">
</head>
<body id="index-page">
  <div class="container">
    <div class="header">
      <div>
        <div class="title">Чаты</div>
        <div id="accountInfo" class="small" style="margin-top:4px"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        <button id="btnCreatePage" class="btn btn-green">Создать чат</button>
        <button id="enablePushBtn" type="button">Включить уведомления</button>
        <button id="btnLogout" class="btn" style="background:transparent;color:var(--muted)">Выйти</button>
      </div>
    </div>

    <div class="card">
      <div class="small" style="margin-bottom:8px">Доступные чаты</div>
      <div id="chats" class="chats-list"></div>
      <div id="emptyHint" class="small" style="margin-top:10px;color:var(--muted)">Чатов нет — создайте новый</div>
    </div>

    <div style="height:12px"></div>
    <div class="log-area card small" id="log">Логи: </div>
  </div>

<script src="/app.js"></script>
<script>
/* index page init */
window.addEventListener('load', async () => {
  if(!app_init()) return; // app_init из app.js
  document.getElementById("btnCreatePage").onclick = () => location.href = "/create.html";
  document.getElementById("btnLogout").onclick = () => { localStorage.removeItem("token"); localStorage.removeItem("userId"); location.href="/login.html"; };
  await app_loadChats(); // загрузит и отрендерит
});
</script>
</body>
</html>
